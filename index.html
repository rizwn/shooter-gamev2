<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SHOOTER — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --panel: #0d1421;
  --border: #1a2a40;
  --accent: #00e5ff;
  --accent2: #ff3c5a;
  --text: #c8d8e8;
  --muted: #3a5060;
  --green: #00ff88;
  --yellow: #ffcc00;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  font-family: 'Rajdhani', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ANIMATED BACKGROUND ── */
#bg-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  z-index: 0; pointer-events: none; opacity: 0.18;
}

/* ── PAGES ── */
.page { display: none; min-height: 100vh; position: relative; z-index: 1; }
.page.active { display: flex; }

/* ══════════════════════════════════════
   LOGIN PAGE
══════════════════════════════════════ */
#page-login {
  align-items: center; justify-content: center;
  flex-direction: column;
}

.login-box {
  width: 380px;
  background: rgba(13,20,33,0.92);
  border: 1px solid var(--border);
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  padding: 44px 40px 40px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 60px rgba(0,229,255,0.06), 0 0 0 1px rgba(0,229,255,0.04);
  animation: fadeUp 0.6s ease both;
}

.logo-area {
  text-align: center;
  margin-bottom: 36px;
}
.logo-icon {
  width: 52px; height: 52px; margin: 0 auto 14px;
  position: relative;
}
.logo-icon svg { width: 100%; height: 100%; }
.logo-title {
  font-size: 28px; font-weight: 700; letter-spacing: 10px;
  color: #fff; text-transform: uppercase;
}
.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 4px;
  margin-top: 4px;
}

.field {
  margin-bottom: 18px;
}
.field label {
  display: block;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
}
.field input {
  width: 100%; background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--muted);
  color: var(--text); font-family: 'Share Tech Mono', monospace;
  font-size: 14px; padding: 12px 14px;
  outline: none; transition: all 0.2s;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
}
.field input:focus {
  border-color: var(--accent);
  border-bottom-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(0,229,255,0.15), 0 4px 20px rgba(0,229,255,0.08);
  background: rgba(0,229,255,0.04);
}
.field input::placeholder { color: var(--muted); }

.btn-primary {
  width: 100%; padding: 14px;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 5px;
  text-transform: uppercase; cursor: pointer;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  transition: all 0.2s; position: relative; overflow: hidden;
  margin-top: 8px;
}
.btn-primary::before {
  content: ''; position: absolute; inset: 0;
  background: var(--accent); transform: scaleX(0);
  transform-origin: left; transition: transform 0.25s ease;
  z-index: 0;
}
.btn-primary:hover::before { transform: scaleX(1); }
.btn-primary:hover { color: #000; }
.btn-primary span { position: relative; z-index: 1; }

.login-footer {
  margin-top: 24px; text-align: center;
  font-size: 12px; color: var(--muted);
}
.login-footer a {
  color: var(--accent); text-decoration: none; cursor: pointer;
  transition: opacity 0.2s;
}
.login-footer a:hover { opacity: 0.7; }

.error-msg {
  background: rgba(255,60,90,0.1); border: 1px solid rgba(255,60,90,0.3);
  color: var(--accent2); font-family: 'Share Tech Mono', monospace;
  font-size: 11px; padding: 10px 14px; margin-bottom: 18px;
  display: none; letter-spacing: 1px;
}
.error-msg.show { display: block; animation: shake 0.3s ease; }

@keyframes shake {
  0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ══════════════════════════════════════
   FRIENDS PAGE
══════════════════════════════════════ */
#page-friends {
  flex-direction: column;
  align-items: stretch;
}

/* NAV */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 60px;
  background: rgba(8,12,20,0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  position: sticky; top:0; z-index:50;
}
.nav-logo { font-size:18px; font-weight:700; letter-spacing:6px; color:#fff; }
.nav-logo span { color: var(--accent); }
.nav-user {
  display: flex; align-items: center; gap: 12px;
  font-family: 'Share Tech Mono', monospace; font-size: 12px;
}
.nav-avatar {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), #0066aa);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #000;
}
.nav-username { color: var(--accent); }
.btn-logout {
  background: transparent; border: 1px solid var(--muted);
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 2px; padding: 5px 12px;
  cursor: pointer; transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

/* MAIN */
.friends-main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 0;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  padding: 32px 24px;
  align-items: start;
  flex: 1;
}

.section-title {
  font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* Friends list */
.friends-panel {
  padding-right: 32px;
}

.add-friend-row {
  display: flex; gap: 10px; margin-bottom: 28px;
}
.add-friend-row input {
  flex: 1; background: rgba(0,0,0,0.4);
  border: 1px solid var(--border); border-bottom: 2px solid var(--muted);
  color: var(--text); font-family: 'Share Tech Mono', monospace;
  font-size: 13px; padding: 10px 14px; outline: none; transition: all 0.2s;
}
.add-friend-row input:focus {
  border-color: var(--accent); box-shadow: 0 0 0 1px rgba(0,229,255,0.1);
}
.add-friend-row input::placeholder { color: var(--muted); }
.btn-add {
  background: var(--accent); border: none;
  color: #000; font-family: 'Rajdhani', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 3px;
  padding: 0 20px; cursor: pointer; transition: all 0.15s;
  clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
}
.btn-add:hover { background: #fff; transform: scale(1.02); }

.friend-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: rgba(13,20,33,0.7);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  margin-bottom: 8px;
  transition: all 0.2s;
  animation: slideIn 0.3s ease both;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
}
.friend-item:hover { border-left-color: var(--accent); background: rgba(0,229,255,0.04); transform: translateX(3px); }
.friend-item.pending { border-left-color: var(--yellow); opacity: 0.7; }
@keyframes slideIn {
  from { opacity:0; transform: translateX(-12px); }
  to   { opacity:1; transform: translateX(0); }
}

.friend-avatar {
  width: 36px; height: 36px; flex-shrink: 0;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #000;
}
.friend-info { flex: 1; min-width: 0; }
.friend-name { font-size: 15px; font-weight: 600; color: #fff; }
.friend-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 1px; margin-top: 2px;
}
.status-online  { color: var(--green); }
.status-ingame  { color: var(--accent); }
.status-offline { color: var(--muted); }
.status-pending { color: var(--yellow); }

.friend-actions { display: flex; gap: 6px; }
.btn-small {
  background: transparent; border: 1px solid var(--muted);
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 1px; padding: 5px 10px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-small:hover { border-color: var(--accent); color: var(--accent); }
.btn-small.invite { border-color: rgba(0,229,255,0.4); color: var(--accent); }
.btn-small.invite:hover { background: rgba(0,229,255,0.12); }
.btn-small.accept { border-color: rgba(0,255,136,0.4); color: var(--green); }
.btn-small.accept:hover { background: rgba(0,255,136,0.1); }
.btn-small.remove { border-color: rgba(255,60,90,0.3); color: rgba(255,60,90,0.5); }
.btn-small.remove:hover { border-color: var(--accent2); color: var(--accent2); }

.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 2px; line-height: 2;
}

/* LOBBY PANEL */
.lobby-panel {
  border-left: 1px solid var(--border);
  padding-left: 32px;
}

.lobby-box {
  background: rgba(13,20,33,0.7);
  border: 1px solid var(--border);
  padding: 24px;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
  margin-bottom: 16px;
}
.lobby-box h3 {
  font-size: 13px; font-weight: 700; letter-spacing: 4px;
  text-transform: uppercase; color: #fff; margin-bottom: 16px;
}

/* Lobby chat */
.lobby-chat-log { height:160px; overflow-y:auto; background:rgba(5,12,25,0.7); border:1px solid rgba(0,229,255,0.2); padding:10px; margin-bottom:10px; display:flex; flex-direction:column; gap:4px; }
.lobby-chat-log::-webkit-scrollbar { width:3px; }
.lobby-chat-log::-webkit-scrollbar-thumb { background:rgba(0,229,255,0.3); border-radius:2px; }
.lc-msg { font-family:"Share Tech Mono",monospace; font-size:11px; line-height:1.6; word-break:break-word; color:#d0e8ff; text-shadow:0 0 6px rgba(0,180,255,0.25); }
.lc-msg .lc-name { font-weight:bold; }
.lc-msg.lc-sys { color:#ffe566; font-style:italic; text-shadow:0 0 6px rgba(255,200,0,0.35); }
.lobby-chat-input-row { display:flex; gap:0; }
.lobby-chat-input-row input { flex:1; background:rgba(5,12,25,0.8); border:1px solid rgba(0,229,255,0.3); border-right:none; color:#e8f4ff; font-family:"Share Tech Mono",monospace; font-size:12px; padding:9px 12px; outline:none; transition:border-color 0.2s; }
.lobby-chat-input-row input:focus { border-color:var(--accent); }
.lobby-chat-input-row input::placeholder { color:var(--muted); }
.lobby-chat-input-row button { background:rgba(0,229,255,0.12); border:1px solid rgba(0,229,255,0.35); color:var(--accent); font-family:"Share Tech Mono",monospace; font-size:11px; letter-spacing:2px; padding:9px 16px; cursor:pointer; transition:background 0.15s; }
.lobby-chat-input-row button:hover { background:rgba(0,229,255,0.25); }

.lobby-slots {
  display: flex; flex-direction: column; gap: 8px;
  margin-bottom: 20px;
}
.lobby-slot {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.3); border: 1px dashed var(--border);
  font-family: 'Share Tech Mono', monospace; font-size: 11px;
  transition: all 0.2s;
}
.lobby-slot.filled {
  border: 1px solid rgba(0,229,255,0.2);
  background: rgba(0,229,255,0.04);
}
.slot-num {
  color: var(--muted); font-size: 10px; width: 16px;
}
.slot-name { flex: 1; color: var(--accent); }
.slot-you  { color: var(--green); }
.slot-empty { color: var(--muted); font-style: italic; }
.slot-badge {
  font-size: 9px; letter-spacing: 1px; padding: 2px 6px;
  background: rgba(0,255,136,0.1); color: var(--green);
  border: 1px solid rgba(0,255,136,0.2);
}

.btn-launch {
  width: 100%; padding: 14px;
  background: transparent;
  border: 1px solid var(--green);
  color: var(--green); font-family: 'Rajdhani', sans-serif;
  font-size: 13px; font-weight: 700; letter-spacing: 5px;
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
}
.btn-launch::before {
  content: ''; position: absolute; inset: 0;
  background: var(--green); transform: scaleX(0);
  transform-origin: left; transition: transform 0.25s ease;
}
.btn-launch:hover::before { transform: scaleX(1); }
.btn-launch:hover { color: #000; }
.btn-launch span { position: relative; z-index: 1; }
.btn-launch:disabled {
  border-color: var(--muted); color: var(--muted); cursor: not-allowed;
}
.btn-launch:disabled::before { display: none; }

/* Map selector */
.map-select { margin-bottom: 20px; }
.map-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px;
}
.map-options { display: flex; gap: 6px; }
.map-opt {
  flex: 1; padding: 8px 4px; text-align: center;
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: 10px; letter-spacing: 1px; cursor: pointer;
  transition: all 0.15s;
}
.map-opt.selected {
  border-color: var(--accent); color: var(--accent);
  background: rgba(0,229,255,0.06);
}
.map-opt:hover:not(.selected) { border-color: var(--muted); color: var(--text); }

/* TOAST */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(13,20,33,0.96); border: 1px solid var(--accent);
  color: var(--accent); font-family: 'Share Tech Mono', monospace;
  font-size: 11px; letter-spacing: 2px; padding: 12px 24px;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
  z-index: 200; white-space: nowrap;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
#toast.show { opacity: 1; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--border);
  padding: 32px; width: 360px; text-align: center;
  clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
  animation: fadeUp 0.25s ease;
}
.modal h3 { font-size:18px; font-weight:700; color:#fff; letter-spacing:3px; margin-bottom:10px; }
.modal p  { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:24px; line-height:1.8; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }

/* Responsive */
@media (max-width: 720px) {
  .friends-main { grid-template-columns: 1fr; padding: 20px 16px; }
  .friends-panel { padding-right: 0; margin-bottom: 32px; }
  .lobby-panel { border-left: none; border-top: 1px solid var(--border); padding-left: 0; padding-top: 28px; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- LOGIN PAGE -->
<div id="page-login" class="page active">
  <div class="login-box">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 52 52" fill="none">
          <polygon points="26,2 50,14 50,38 26,50 2,38 2,14" stroke="#00e5ff" stroke-width="1.5" fill="rgba(0,229,255,0.04)"/>
          <polygon points="26,10 42,18 42,34 26,42 10,34 10,18" stroke="#00e5ff" stroke-width="0.5" fill="rgba(0,229,255,0.03)" opacity="0.5"/>
          <!-- gun silhouette -->
          <rect x="14" y="23" width="20" height="6" rx="1" fill="#00e5ff" opacity="0.9"/>
          <rect x="34" y="24" width="6" height="2" rx="1" fill="#00e5ff" opacity="0.7"/>
          <rect x="20" y="29" width="5" height="7" rx="1" fill="#00e5ff" opacity="0.6"/>
          <circle cx="38" cy="26" r="1.5" fill="#fff" opacity="0.9"/>
        </svg>
      </div>
      <div class="logo-title">SHOOTER</div>
      <div class="logo-sub">v0.1.0 · ALPHA BUILD</div>
    </div>

    <div class="error-msg" id="login-error">INVALID CREDENTIALS — TRY AGAIN</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="input-user" placeholder="enter callsign..." autocomplete="off" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="input-pass" placeholder="••••••••" autocomplete="off" />
    </div>

    <button class="btn-primary" id="btn-login"><span>ENTER GAME</span></button>

    <div class="login-footer">
      No account? <a id="link-register">Register here</a>
    </div>
  </div>
</div>

<!-- FRIENDS PAGE -->
<div id="page-friends" class="page">
  <nav class="nav">
    <div class="nav-logo">SHOOT<span>ER</span></div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar-letter">?</div>
      <div class="nav-username" id="nav-username-display">—</div>
      <button class="btn-logout" id="btn-logout">LOGOUT</button>
    </div>
  </nav>

  <div class="friends-main">
    <!-- Left: Friends list -->
    <div class="friends-panel">
      <div class="section-title">Friends</div>

      <div class="add-friend-row">
        <input type="text" id="friend-input" placeholder="add by username..." autocomplete="off" />
        <button class="btn-add" id="btn-add-friend">ADD</button>
      </div>

      <div id="friends-list">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Right: Lobby -->
    <div class="lobby-panel">
      <div class="section-title">Lobby</div>

      <div class="lobby-box">
        <h3>CURRENT SESSION</h3>

        <div class="map-select">
          <div class="map-label">MAP SELECT</div>
          <div class="map-options">
            <div class="map-opt selected" data-map="BASEPLATE">BASEPLATE</div>
            <div class="map-opt" data-map="RUINS">RUINS</div>
            <div class="map-opt" data-map="BUNKER">BUNKER</div>
          </div>
        </div>

        <div class="lobby-slots" id="lobby-slots">
          <!-- populated by JS -->
        </div>

        <button class="btn-launch" id="btn-launch"><span>LAUNCH GAME</span></button>
      </div>

      <div class="lobby-box">
        <h3>PARTY CHAT</h3>
        <div class="lobby-chat-log" id="lobby-chat-log"></div>
        <div class="lobby-chat-input-row">
          <input type="text" id="lobby-chat-input" placeholder="type a message..." maxlength="120" autocomplete="off" />
          <button id="lobby-chat-send">SEND</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">INVITE FRIEND</h3>
    <p id="modal-body">Send game invite to <strong id="modal-target"></strong>?</p>
    <div class="modal-btns">
      <button class="btn-small accept" id="modal-confirm">CONFIRM</button>
      <button class="btn-small remove" id="modal-cancel">CANCEL</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script>
// ─── BACKGROUND ANIMATION ─────────────────────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bctx = bgCanvas.getContext('2d');
let bw, bh;
function bResize() { bw = bgCanvas.width = innerWidth; bh = bgCanvas.height = innerHeight; }
bResize(); window.addEventListener('resize', bResize);

const nodes = Array.from({length: 40}, () => ({
  x: Math.random()*1920, y: Math.random()*1080,
  vx: (Math.random()-.5)*0.3, vy: (Math.random()-.5)*0.3
}));

function drawBg(t) {
  bctx.clearRect(0,0,bw,bh);
  nodes.forEach(n => {
    n.x = (n.x + n.vx + bw) % bw;
    n.y = (n.y + n.vy + bh) % bh;
  });
  for (let i=0; i<nodes.length; i++) {
    for (let j=i+1; j<nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 160) {
        bctx.strokeStyle = `rgba(0,229,255,${(1-d/160)*0.4})`;
        bctx.lineWidth = 0.5;
        bctx.beginPath(); bctx.moveTo(nodes[i].x, nodes[i].y); bctx.lineTo(nodes[j].x, nodes[j].y); bctx.stroke();
      }
    }
    bctx.fillStyle = 'rgba(0,229,255,0.5)';
    bctx.beginPath(); bctx.arc(nodes[i].x, nodes[i].y, 1.5, 0, Math.PI*2); bctx.fill();
  }
  requestAnimationFrame(drawBg);
}
requestAnimationFrame(drawBg);

// ─── STATE ───────────────────────────────────────────────────────────
let currentUser = null;

// Fake user DB (local only)
const users = JSON.parse(localStorage.getItem('shooter_users') || '{}');

// Each user entry: { password, friends: [{name, status, pending}], lobby: [name, ...] }
function saveUsers() { localStorage.setItem('shooter_users', JSON.stringify(users)); }

const avatarColors = ['#00e5ff','#ff3c5a','#00ff88','#ffcc00','#aa44ff','#ff8800'];
function avatarColor(name) {
  let h = 0; for (let c of name) h += c.charCodeAt(0);
  return avatarColors[h % avatarColors.length];
}

// ─── UTILITIES ────────────────────────────────────────────────────────
function toast(msg, type='accent') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type==='green' ? 'var(--green)' : type==='red' ? 'var(--accent2)' : 'var(--accent)';
  el.style.color = type==='green' ? 'var(--green)' : type==='red' ? 'var(--accent2)' : 'var(--accent)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

let modalResolve = null;
function showModal(title, body, target) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  if (target) document.getElementById('modal-target').textContent = target;
  document.getElementById('modal').classList.add('show');
  return new Promise(res => { modalResolve = res; });
}
document.getElementById('modal-confirm').addEventListener('click', () => { document.getElementById('modal').classList.remove('show'); if(modalResolve) modalResolve(true); });
document.getElementById('modal-cancel').addEventListener('click',  () => { document.getElementById('modal').classList.remove('show'); if(modalResolve) modalResolve(false); });

// ─── LOGIN ────────────────────────────────────────────────────────────
document.getElementById('btn-login').addEventListener('click', doLogin);
document.getElementById('input-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('input-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('input-pass').focus(); });

function doLogin() {
  const u = document.getElementById('input-user').value.trim().toLowerCase();
  const p = document.getElementById('input-pass').value;
  const err = document.getElementById('login-error');

  if (!u || !p) { err.classList.add('show'); err.textContent = 'ENTER USERNAME AND PASSWORD'; return; }

  if (users[u]) {
    if (users[u].password !== p) { err.classList.add('show'); err.textContent = 'WRONG PASSWORD'; return; }
  } else {
    // Auto-register
    users[u] = { password: p, friends: [], lobby: [u] };
    saveUsers();
    toast('ACCOUNT CREATED — WELCOME, ' + u.toUpperCase(), 'green');
  }

  err.classList.remove('show');
  currentUser = u;
  showFriendsPage();
}

document.getElementById('link-register').addEventListener('click', () => {
  toast('JUST ENTER A NEW USERNAME + PASSWORD TO REGISTER');
});

// ─── FRIENDS PAGE ─────────────────────────────────────────────────────
function showFriendsPage() {
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-friends').classList.add('active');
  document.getElementById('nav-username-display').textContent = currentUser.toUpperCase();
  document.getElementById('nav-avatar-letter').textContent = currentUser[0].toUpperCase();
  const roomId = (currentUser + '-default').toLowerCase().replace(/[^a-z0-9]/g,'-');
  connectLobbyChat(roomId, currentUser);
  document.getElementById('nav-avatar-letter').style.background = `linear-gradient(135deg, ${avatarColor(currentUser)}, #003355)`;
  renderFriends();
  renderLobby();
}

document.getElementById('btn-logout').addEventListener('click', () => {
  currentUser = null;
  document.getElementById('page-friends').classList.remove('active');
  document.getElementById('page-login').classList.add('active');
  document.getElementById('input-user').value = '';
  document.getElementById('input-pass').value = '';
});

// ─── ADD FRIEND ───────────────────────────────────────────────────────
document.getElementById('btn-add-friend').addEventListener('click', addFriend);
document.getElementById('friend-input').addEventListener('keydown', e => { if(e.key==='Enter') addFriend(); });

function addFriend() {
  const inp = document.getElementById('friend-input');
  const name = inp.value.trim().toLowerCase();
  if (!name) return;
  if (name === currentUser) { toast('YOU CANNOT ADD YOURSELF', 'red'); return; }

  const ud = users[currentUser];
  const already = ud.friends.find(f => f.name === name);
  if (already) { toast('ALREADY IN YOUR FRIENDS LIST', 'red'); inp.value=''; return; }

  ud.friends.push({ name, status: users[name] ? 'online' : 'offline', pending: true });
  saveUsers();
  inp.value = '';
  renderFriends();
  toast(`FRIEND REQUEST SENT TO ${name.toUpperCase()}`);
}

// ─── RENDER FRIENDS ───────────────────────────────────────────────────
const statuses = ['online','ingame','offline'];
function randomStatus() { return statuses[Math.floor(Math.random()*statuses.length)]; }

function renderFriends() {
  const container = document.getElementById('friends-list');
  const ud = users[currentUser];
  if (!ud.friends.length) {
    container.innerHTML = `<div class="empty-state">NO FRIENDS YET<br>ADD SOMEONE TO GET STARTED</div>`;
    return;
  }
  container.innerHTML = '';
  ud.friends.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'friend-item' + (f.pending ? ' pending' : '');
    el.style.animationDelay = (i * 0.05) + 's';

    const statusText = f.pending ? 'PENDING...' : f.status === 'online' ? '● ONLINE' : f.status === 'ingame' ? '▶ IN GAME' : '○ OFFLINE';
    const statusClass = f.pending ? 'status-pending' : `status-${f.status}`;

    const canInvite = !f.pending && f.status !== 'offline';
    const inLobby = ud.lobby.includes(f.name);

    el.innerHTML = `
      <div class="friend-avatar" style="background:linear-gradient(135deg,${avatarColor(f.name)},#003355)">${f.name[0].toUpperCase()}</div>
      <div class="friend-info">
        <div class="friend-name">${f.name.toUpperCase()}</div>
        <div class="friend-status ${statusClass}">${statusText}</div>
      </div>
      <div class="friend-actions">
        ${f.pending ? `<button class="btn-small accept" data-action="accept" data-name="${f.name}">ACCEPT</button>` : ''}
        ${canInvite && !inLobby ? `<button class="btn-small invite" data-action="invite" data-name="${f.name}">INVITE</button>` : ''}
        ${inLobby && !f.pending ? `<button class="btn-small" data-action="kick" data-name="${f.name}">IN LOBBY</button>` : ''}
        <button class="btn-small remove" data-action="remove" data-name="${f.name}">✕</button>
      </div>
    `;
    container.appendChild(el);
  });

  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => handleFriendAction(btn.dataset.action, btn.dataset.name));
  });
}

async function handleFriendAction(action, name) {
  const ud = users[currentUser];
  if (action === 'invite') {
    const ok = await showModal('INVITE TO LOBBY', `Send game invite to <strong style="color:var(--accent)">${name.toUpperCase()}</strong>?`);
    if (!ok) return;
    if (!ud.lobby.includes(name)) ud.lobby.push(name);
    saveUsers(); renderFriends(); renderLobby();
    toast(`${name.toUpperCase()} ADDED TO LOBBY`, 'green');
  }
  else if (action === 'accept') {
    const f = ud.friends.find(f => f.name === name);
    if (f) { f.pending = false; f.status = randomStatus(); }
    saveUsers(); renderFriends();
    toast(`${name.toUpperCase()} IS NOW YOUR FRIEND`, 'green');
  }
  else if (action === 'kick') {
    ud.lobby = ud.lobby.filter(n => n !== name);
    saveUsers(); renderFriends(); renderLobby();
    toast(`${name.toUpperCase()} REMOVED FROM LOBBY`);
  }
  else if (action === 'remove') {
    const ok = await showModal('REMOVE FRIEND', `Remove <strong style="color:var(--accent2)">${name.toUpperCase()}</strong> from your friends list?`);
    if (!ok) return;
    ud.friends = ud.friends.filter(f => f.name !== name);
    ud.lobby = ud.lobby.filter(n => n !== name);
    saveUsers(); renderFriends(); renderLobby();
    toast(`${name.toUpperCase()} REMOVED`, 'red');
  }
}

// ─── LOBBY ────────────────────────────────────────────────────────────
const MAX_PLAYERS = 4;
function renderLobby() {
  const ud = users[currentUser];
  const slots = document.getElementById('lobby-slots');
  slots.innerHTML = '';
  for (let i = 0; i < MAX_PLAYERS; i++) {
    const name = ud.lobby[i];
    const el = document.createElement('div');
    el.className = 'lobby-slot' + (name ? ' filled' : '');
    if (name) {
      const isYou = name === currentUser;
      el.innerHTML = `
        <div class="slot-num">${i+1}</div>
        <div class="friend-avatar" style="width:24px;height:24px;font-size:10px;background:linear-gradient(135deg,${avatarColor(name)},#003355)">${name[0].toUpperCase()}</div>
        <div class="slot-name ${isYou ? 'slot-you' : ''}">${name.toUpperCase()}</div>
        ${isYou ? '<div class="slot-badge">YOU</div>' : ''}
      `;
    } else {
      el.innerHTML = `<div class="slot-num">${i+1}</div><div class="slot-empty">waiting for player...</div>`;
    }
    slots.appendChild(el);
  }

  const btn = document.getElementById('btn-launch');
  btn.disabled = false;
}

// Map select
document.querySelectorAll('.map-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.map-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

// Launch
document.getElementById('btn-launch').addEventListener('click', () => {
  const map = document.querySelector('.map-opt.selected')?.dataset.map || 'BASEPLATE';
  const ud = users[currentUser];
  // Use current user + map as the room ID so all lobby members join same room
  const map2 = document.querySelector('.map-opt.selected')?.dataset.map || 'BASEPLATE';
  const roomId2 = (currentUser + '-' + map2).toLowerCase().replace(/[^a-z0-9]/g,'-');
  // reconnect lobby chat to same room as game
  connectLobbyChat(roomId2, currentUser);
  const gameUrl = `shooter.html?user=${encodeURIComponent(currentUser)}&room=${encodeURIComponent(roomId2)}`;
  toast(`LAUNCHING! SHARE ROOM: ${roomId2.toUpperCase()}`, 'green');
  setTimeout(() => { window.open(gameUrl, '_blank'); }, 800);
});

// ─── ENTER KEY ON FRIENDS INPUT ───────────────────────────────────────
document.getElementById('friend-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFriend();
});
// ── LOBBY CHAT (Ably) ──────────────────────────────────────────────────
const ABLY_KEY = 'eed3KQ.no0pow:SdH7fgwofQ4pno7VoUd6vHvr_t5i5ViLHMHpEonYtPg';
let lobbyAbly = null, lobbyChannel = null;
const LOBBY_COLORS = [0x00e5ff,0xff3c5a,0x00ff88,0xffcc00,0xaa44ff,0xff8800];
function lcColorForName(n){let h=0;for(const c of n)h+=c.charCodeAt(0);return LOBBY_COLORS[h%LOBBY_COLORS.length];}
function hexCol(c){'#'+c.toString(16).padStart(6,'0');}

function addLobbyMsg(name, text, sys) {
  const log = document.getElementById('lobby-chat-log');
  if (!log) return;
  const el = document.createElement('div');
  el.className = 'lc-msg' + (sys ? ' lc-sys' : '');
  if (sys) {
    el.textContent = text;
  } else {
    const col = '#' + lcColorForName(name).toString(16).padStart(6,'0');
    el.innerHTML = `<span class="lc-name" style="color:${col}">${name.toUpperCase()}:</span> ${text.replace(/</g,'&lt;')}`;
  }
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function connectLobbyChat(roomId, username) {
  if (lobbyAbly) { try { lobbyAbly.close(); } catch(e){} }
  const clientId = username + '_' + Math.random().toString(36).slice(2,6);
  lobbyAbly = new Ably.Realtime({ key: ABLY_KEY, clientId });
  lobbyAbly.connection.on('connected', () => {
    lobbyChannel = lobbyAbly.channels.get('shooter-lobby:' + roomId);
    lobbyChannel.presence.enter({ name: username });
    lobbyChannel.subscribe('lobby-chat', m => {
      if (m.clientId === clientId) return;
      addLobbyMsg(m.data.name, m.data.text);
    });
    lobbyChannel.presence.subscribe('enter', m => {
      if (m.clientId === clientId) return;
      addLobbyMsg(null, m.data.name.toUpperCase() + ' joined the lobby', true);
    });
    lobbyChannel.presence.subscribe('leave', m => {
      addLobbyMsg(null, (m.data?.name||'Someone').toUpperCase() + ' left', true);
    });
    addLobbyMsg(null, 'Connected to lobby chat · ' + roomId.toUpperCase(), true);
  });
}

function sendLobbyChat() {
  const inp = document.getElementById('lobby-chat-input');
  const txt = inp.value.trim();
  if (!txt || !lobbyChannel || !currentUser) return;
  inp.value = '';
  lobbyChannel.publish('lobby-chat', { name: currentUser, text: txt });
  addLobbyMsg(currentUser, txt);
}

document.getElementById('lobby-chat-send').addEventListener('click', sendLobbyChat);
document.getElementById('lobby-chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendLobbyChat();
});

</script>
